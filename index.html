<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERSKALISKA | AMG PERFORMANCE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800;900&display=swap');

        /* --- THEME VARS: MERCEDES AMG PETRONAS F1 --- */
        :root {
            --amg-tosca: #00A19C;
            --amg-black: #000000;
            --amg-dark: #0D0D0D;
            --amg-panel: #141414;
            --amg-silver: #A2AAAD;
            --pure-white: #FFFFFF;
            --text-muted: #8A8D91;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

        body {
            background-color: var(--amg-black); 
            color: var(--pure-white);
            overflow-x: hidden; min-height: 100vh;
            line-height: 1.5;
            position: relative; /* Penting untuk absolute positioning */
        }

        /* --- TOP RACING STRIPE --- */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--amg-tosca) 0%, var(--amg-tosca) 35%, var(--amg-silver) 35%, var(--amg-silver) 100%);
            z-index: 10001;
        }

        /* --- NAVIGASI HEADER (FIXED) --- */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 6%; background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid #1f1f1f;
            position: fixed; top: 4px; width: 100%; z-index: 1000;
            height: 70px; backdrop-filter: blur(10px);
        }

        .header-brand { display: flex; align-items: center; gap: 12px; }

        .main-logo { height: 35px; width: auto; border-radius: 2px; border: 1px solid #222; }

        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--pure-white); letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; }
        .logo-text span { color: var(--amg-tosca); margin-left: 4px; }
        
        .logo-badge { background: var(--amg-tosca); color: var(--amg-black); font-size: 0.75rem; padding: 2px 6px; margin-left: 10px; font-weight: 900; letter-spacing: 1px; transform: skewX(-15deg); }

        .nav-links a { color: var(--amg-silver); text-decoration: none; font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; transition: 0.2s; text-transform: uppercase; }
        .nav-links a:hover { color: var(--pure-white); }

        /* --- DESKTOP NAV CONTROLS (DI BAWAH HEADER, TIDAK IKUT SCROLL) --- */
        .nav-controls {
            position: absolute;
            top: 85px; 
            right: 6%;
            z-index: 990;
            display: flex; gap: 6px;
        }

        .btn-nav {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: var(--amg-tosca); color: var(--amg-black);
            border: none; font-weight: 900; cursor: pointer;
            transition: 0.2s; font-size: 1rem; transform: skewX(-15deg);
            box-shadow: 0 0 10px rgba(0, 161, 156, 0.3);
        }
        .btn-nav span { transform: skewX(15deg); }
        .btn-nav:hover:not(:disabled) { background: var(--pure-white); transform: skewX(-15deg) scale(1.1); }
        .btn-nav:disabled { opacity: 0.2; cursor: not-allowed; background: #333; color: #666; box-shadow: none; }

        /* --- SPA SYSTEM --- */
        main { width: 100%; min-height: 100vh; display: flex; flex-direction: column; padding-top: 74px; }
        .page-view { display: none; padding-bottom: 60px; animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; width: 100%; flex-grow: 1; position: relative; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
