<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE GATEWAY | PADDOCK</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800;900&display=swap');
        :root { --amg-tosca: #00A19C; --amg-black: #000000; --pure-white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, var(--amg-black) 100%); color: var(--pure-white); height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box { background: rgba(10, 10, 10, 0.9); border: 1px solid #222; padding: 40px; width: 100%; max-width: 400px; border-top: 3px solid var(--amg-tosca); box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .brand { text-align: center; margin-bottom: 30px; }
        .brand h2 { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }
        .brand span { color: var(--amg-tosca); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; letter-spacing: 1px; }
        .input-group input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: white; padding: 12px; font-size: 1rem; outline: none; text-align: center; font-weight: bold; letter-spacing: 2px;}
        .input-group input:focus { border-color: var(--amg-tosca); }
        .btn-login { width: 100%; padding: 15px; background: var(--pure-white); color: var(--amg-black); border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
        .btn-login:hover { background: var(--amg-tosca); color: white; }
        .error-msg { color: #ff3333; font-size: 0.8rem; text-align: center; margin-top: 15px; height: 15px; font-weight: bold;}
    </style>
</head>
<body>
    <div class="login-box">
        <div class="brand"><h2>PADDOCK<span>OS</span></h2></div>
        <div class="input-group"><label>OPERATOR ID</label><input type="text" id="userid" autocomplete="off" spellcheck="false"></div>
        <div class="input-group"><label>PASSCODE</label><input type="password" id="passcode"></div>
        <button class="btn-login" id="btn-auth" onclick="attemptLogin()">Authorize</button>
        <div class="error-msg" id="error-msg"></div>
    </div>
    <script>
        const API_URL = 'https://gzvlwrwjofdvupvisvhr.supabase.co/rest/v1/rpc/verify_operator';
        const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dmx3cndqb2ZkdnVwdmlzdmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTU5OTksImV4cCI6MjA5MzI5MTk5OX0.1JSIGeJOtKqY41ZnJAwITwsJ_wx7QQnBv5XmfRZzcnQ';

        async function attemptLogin() {
            const user = document.getElementById('userid').value.trim().toUpperCase();
            const pass = document.getElementById('passcode').value.trim();
            const btn = document.getElementById('btn-auth');
            const err = document.getElementById('error-msg');
            
            if(!user || !pass) return;
            btn.innerText = "VERIFYING..."; err.innerText = "";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ op_id: user, op_pass: pass })
                });

                const role = await res.json();
                
                if (role) { // Kalau role dikembalikan (misal: 'ADMIN' atau 'MEMBER')
                    sessionStorage.setItem('activeOperator', user);
                    sessionStorage.setItem('operatorRole', role);
                    window.location.href = 'paddock.html';
                } else {
                    err.innerText = "ACCESS DENIED. INVALID CREDENTIALS.";
                }
            } catch (e) {
                err.innerText = "SERVER TIMEOUT.";
            }
            btn.innerText = "AUTHORIZE";
        }
        document.addEventListener("keypress", (e) => { if (e.key === "Enter") attemptLogin(); });
    </script>
</body>
</html>
