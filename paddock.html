<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddock Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-deep: #202225;
            --bg-sidebar: #2f3136;
            --bg-chat: #36393f;
            --bg-input: #40444b;
            --text-main: #dcddde;
            --text-muted: #8e9297;
            --accent: #5865F2;
            --accent-hover: #4752C4;
            --danger: #ed4245;
            --danger-hover: #c9383a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-deep); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

        /* SIDEBAR (Channels & Admin) */
        .sidebar { width: 260px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #222; }
        .server-header { padding: 20px; font-weight: 800; font-size: 1rem; border-bottom: 1px solid #222; color: white; letter-spacing: 1px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .server-header span { color: var(--text-muted); font-weight: 500; }
        
        .channel-list { flex-grow: 1; padding: 15px 10px; overflow-y: auto; }
        .category { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; padding-left: 5px; letter-spacing: 1px; }
        .channel { width: 100%; text-align: left; background: transparent; border: none; color: var(--text-muted); padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 0.95rem; font-weight: 500; margin-bottom: 2px; transition: 0.1s; display: flex; align-items: center; gap: 8px; }
        .channel:hover { background: rgba(79, 84, 92, 0.4); color: var(--text-main); }
        .channel.active { background: rgba(79, 84, 92, 0.6); color: white; }
        .channel span { font-family: monospace; color: var(--text-muted); font-weight: bold;}
        .channel.active span { color: white; }

        .admin-zone { padding: 15px 10px; border-top: 1px solid #222; display: none; }
        .btn-clear-all { width: 100%; background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px; border-radius: 4px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.85rem; letter-spacing: 1px;}
        .btn-clear-all:hover { background: var(--danger); color: white; }

        .user-panel { background: #292b2f; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #222;}
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: 700; font-size: 0.95rem; color: white; }
        .user-role { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 1px;}
        .btn-logout { background: transparent; border: 1px solid #444; color: var(--text-muted); padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.2s; letter-spacing: 1px;}
        .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

        /* CHAT AREA */
        .chat-area { flex-grow: 1; background: var(--bg-chat); display: flex; flex-direction: column; }
        .chat-header { height: 60px; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 20px; font-weight: 600; font-size: 1.1rem; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); z-index: 2;}
        .chat-header span { color: var(--text-muted); margin-right: 8px; font-family: monospace;}
        
        .messages-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { display: flex; gap: 15px; max-width: 100%; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; background: var(--bg-input); border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-muted); flex-shrink: 0;}
        .msg-content { flex-grow: 1; min-width: 0; }
        .msg-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
        .msg-author { font-weight: 600; color: white; font-size: 1rem; }
        .msg-time { font-size: 0.75rem; color: var(--text-muted); }
        .msg-text { color: var(--text-main); font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        
        /* TOMBOL HAPUS PESAN */
        .msg-actions { opacity: 0; transition: 0.2s; display: flex; gap: 10px; align-items: center; margin-left: auto;}
        .message:hover .msg-actions { opacity: 1; }
        .btn-delete { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.8rem; font-weight: bold; padding: 2px 5px; }
        .btn-delete:hover { color: var(--danger); text-decoration: underline;}

        /* INPUT AREA */
        .input-area { padding: 20px; background: var(--bg-chat); }
        .input-wrapper { background: var(--bg-input); border-radius: 8px; display: flex; padding: 10px 15px; align-items: center; gap: 10px; }
        .input-wrapper input { flex-grow: 1; background: transparent; border: none; color: var(--text-main); font-size: 1rem; outline: none; }
        .input-wrapper input::placeholder { color: #72767d; }
        .btn-send { background: var(--text-muted); border: none; color: var(--bg-deep); padding: 8px 15px; border-radius: 4px; font-weight: 700; cursor: pointer; transition: 0.2s; letter-spacing: 1px;}
        .btn-send:hover { background: white; }

        /* CODE BLOCK AESTHETIC */
        .code-block { background: var(--bg-deep); border: 1px solid #222; border-radius: 4px; margin-top: 8px; position: relative; overflow: hidden; }
        .code-header { background: #292b2f; padding: 5px 10px; display: flex; justify-content: flex-end; border-bottom: 1px solid #222; }
        .btn-copy { background: #4f545c; color: white; border: none; padding: 4px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; cursor: pointer; }
        .btn-copy:hover { background: var(--accent); }
        .code-block pre { padding: 12px; margin: 0; font-family: 'Consolas', monospace; font-size: 0.85rem; color: #a3be8c; overflow-x: auto; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="server-header">PADDOCK <span>// OS</span></div>
        
        <div class="channel-list">
            <div class="category">TEXT CHANNELS</div>
            <button class="channel active" onclick="switchChannel('general', this)">
                <span>#</span> general-chat
            </button>
            <button class="channel" onclick="switchChannel('announcements', this)">
                <span>!</span> announcements
            </button>
        </div>

        <div class="admin-zone" id="admin-tools">
            <div class="category" style="margin-bottom: 10px;">ADMIN CONTROLS</div>
            <button class="btn-clear-all" onclick="clearCurrentChannel()">[ PURGE CHANNEL ]</button>
        </div>

        <div class="user-panel">
            <div class="user-info">
                <div class="user-name" id="my-id">USER</div>
                <div class="user-role" id="my-role">ROLE</div>
            </div>
            <button class="btn-logout" onclick="logout()" title="Logout">EXIT</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chat-title"><span>#</span> general-chat</div>
        
        <div class="messages-container" id="messages-container">
            <!-- Messages render here -->
        </div>

        <div class="input-area" id="input-container">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Message #general-chat (Use ``` for code)" autocomplete="off">
                <button class="btn-send" onclick="sendMessage()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const activeOp = sessionStorage.getItem('activeOperator');
        if (!activeOp) window.location.href = 'login.html';

        const roleOp = (activeOp === 'OPS01') ? 'ADMIN' : 'MEMBER';
        
        document.getElementById('my-id').innerText = activeOp;
        document.getElementById('my-role').innerText = roleOp;

        if (roleOp === 'ADMIN') {
            document.getElementById('admin-tools').style.display = 'block';
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

        const API_URL = '[https://gzvlwrwjofdvupvisvhr.supabase.co/rest/v1](https://gzvlwrwjofdvupvisvhr.supabase.co/rest/v1)';
        const API_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dmx3cndqb2ZkdnVwdmlzdmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTU5OTksImV4cCI6MjA5MzI5MTk5OX0.1JSIGeJOtKqY41ZnJAwITwsJ_wx7QQnBv5XmfRZzcnQ';
        const HEADERS = { 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };

        let currentChannel = 'general';
        let renderedMessages = {};

        function switchChannel(channel, btnEl) {
            currentChannel = channel;
            
            document.querySelectorAll('.channel').forEach(btn => btn.classList.remove('active'));
            btnEl.classList.add('active');
            document.getElementById('chat-title').innerHTML = channel === 'general' ? '<span>#</span> general-chat' : '<span>!</span> announcements';
            
            const inputContainer = document.getElementById('input-container');
            if (channel === 'announcements' && roleOp !== 'ADMIN') {
                inputContainer.style.display = 'none';
            } else {
                inputContainer.style.display = 'block';
                document.getElementById('chat-input').placeholder = `Message #${channel}... (Use \`\`\` for code)`;
            }

            document.getElementById('messages-container').innerHTML = '';
            renderedMessages = {};
            syncMessages();
        }

        function formatMessage(text) {
            let safe = text.replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            safe = safe.replace(/```([\s\S]*?)```/g, function(m, code) {
                const id = 'code-' + Math.random().toString(36).substr(2, 5);
                return `
                <div class="code-block">
                    <div class="code-header"><button class="btn-copy" onclick="copyCode('${id}', this)">COPY</button></div>
                    <pre><code id="${id}">${code.trim()}</code></pre>
                </div>`;
            });
            return safe;
        }

        window.copyCode = function(id, btn) {
            navigator.clipboard.writeText(document.getElementById(id).innerText).then(() => {
                btn.innerText = "COPIED"; btn.style.background = "#5865F2";
                setTimeout(() => { btn.innerText = "COPY"; btn.style.background = "#4f545c"; }, 2000);
            });
        };

        function renderMessageData(msgData) {
            const container = document.getElementById('messages-container');
            const div = document.createElement('div');
            div.className = 'message';
            div.id = `msg-${msgData.id}`;

            const initial = msgData.operator_id ? msgData.operator_id.substring(0, 2).toUpperCase() : '??';
            
            let deleteBtn = '';
            if (roleOp === 'ADMIN' || activeOp === msgData.operator_id) {
                deleteBtn = `<div class="msg-actions"><button class="btn-delete" onclick="deleteMessage(${msgData.id})" title="Delete">[DEL]</button></div>`;
            }

            let timeStr = new Date(msgData.created_at || Date.now()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            div.innerHTML = `
                <div class="avatar">${initial}</div>
                <div class="msg-content">
                    <div class="msg-header">
                        <span class="msg-author">${msgData.operator_id || 'SYSTEM'}</span>
                        <span class="msg-time">${timeStr}</span>
                        ${deleteBtn}
                    </div>
                    <div class="msg-text">${formatMessage(msgData.message)}</div>
                </div>
            `;
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';

            const table = currentChannel === 'general' ? 'paddock_comms' : 'paddock_directives';
            const payload = currentChannel === 'general' ? { operator_id: activeOp, message: text } : { message: `[BROADCAST] ${text}`, operator_id: activeOp };
            
            await fetch(`${API_URL}/${table}`, { method: 'POST', headers: HEADERS, body: JSON.stringify(payload) });
            syncMessages();
        }

        async function deleteMessage(id) {
            if (!confirm("Delete this message?")) return;
            
            const table = currentChannel === 'general' ? 'paddock_comms' : 'paddock_directives';
            await fetch(`${API_URL}/${table}?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
            
            if(renderedMessages[id]) {
                renderedMessages[id].remove();
                delete renderedMessages[id];
            }
        }

        async function clearCurrentChannel() {
            if (roleOp !== 'ADMIN') return;
            if (confirm(`WARNING: Purge ALL data in #${currentChannel}?`)) {
                const table = currentChannel === 'general' ? 'paddock_comms' : 'paddock_directives';
                await fetch(`${API_URL}/${table}?id=gt.0`, { method: 'DELETE', headers: HEADERS });
                document.getElementById('messages-container').innerHTML = '';
                renderedMessages = {};
            }
        }

        async function syncMessages() {
            const table = currentChannel === 'general' ? 'paddock_comms' : 'paddock_directives';
            try {
                const res = await fetch(`${API_URL}/${table}?select=*&order=id.desc&limit=50`, { headers: HEADERS });
                if (!res.ok) return;
                
                let data = await res.json();
                data.reverse();

                const currentFetchedIds = new Set(data.map(d => d.id));

                for (let id in renderedMessages) {
                    if (!currentFetchedIds.has(parseInt(id))) {
                        renderedMessages[id].remove();
                        delete renderedMessages[id];
                    }
                }

                data.forEach(msgData => {
                    if (!renderedMessages[msgData.id]) {
                        renderedMessages[msgData.id] = renderMessageData(msgData);
                    }
                });
            } catch (err) {}
        }

        syncMessages();
        setInterval(syncMessages, 2000);

        document.getElementById('chat-input').addEventListener('keypress', e => { 
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
