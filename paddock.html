<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADDOCK | DIAGNOSTICS</title>
    <!-- Script Supabase dari CDN Resmi -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap');
        :root { --amg-tosca: #00A19C; --amg-black: #000000; --amg-dark: #0D0D0D; --amg-panel: #111111; --amg-silver: #A2AAAD; --pure-white: #FFFFFF; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background-color: var(--amg-black); color: var(--pure-white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Debug Console - Buat ngelacak masalah */
        #debug-console { background: #330000; color: #ff6666; padding: 10px; font-family: monospace; font-size: 0.8rem; font-weight: bold; text-align: center; display: none; border-bottom: 2px solid red; z-index: 9999;}
        
        header { background: var(--amg-panel); height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--amg-tosca); }
        .operator-tag { background: var(--pure-white); color: var(--amg-black); padding: 4px 10px; font-weight: 800; border-radius: 2px; }
        
        .paddock-container { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 60px); gap: 20px; padding: 20px; }
        .panel { background: var(--amg-dark); border: 1px solid #222; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background: #1a1a1a; padding: 10px 15px; font-size: 0.8rem; font-weight: 800; color: var(--amg-silver); text-transform: uppercase; border-bottom: 1px solid #222; display:flex; justify-content: space-between; align-items:center;}
        
        #server-status { color: #ff3333; font-size: 0.7rem; } /* Merah = Mati, Hijau = Nyala */

        #admin-panel { display: none; padding: 15px; background: #151515; border-bottom: 1px solid #222; }
        .admin-input { display: flex; gap: 10px; }
        .admin-input input { flex-grow: 1; background: transparent; border: 1px solid #333; color: white; padding: 8px; font-family: monospace; outline: none; }
        .admin-input button { background: var(--pure-white); color: black; border: none; padding: 0 15px; font-weight: 800; cursor: pointer; }
        
        .log-box { flex-grow: 1; padding: 15px; font-family: monospace; font-size: 0.8rem; line-height: 1.6; overflow-y: auto; color: #888; }
        .log-item { margin-bottom: 5px; border-left: 2px solid #333; padding-left: 10px; }
        .log-item.important { color: white; border-left-color: var(--amg-tosca); background: rgba(0,161,156,0.05); }
        
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { font-size: 0.8rem; max-width: 85%; margin-bottom: 5px; }
        .msg-body { background: #1a1a1a; padding: 8px; border-radius: 2px; border-left: 2px solid var(--amg-silver); }
        .msg.self { align-self: flex-end; }
        .msg.self .msg-body { border-left: none; border-right: 2px solid var(--amg-tosca); background: #111; }
        
        .chat-input { display: flex; padding: 15px; background: #1a1a1a; border-top: 1px solid #222; }
        .chat-input input { flex-grow: 1; background: transparent; border: none; color: white; outline: none; }
        .chat-input button { background: var(--amg-tosca); border: none; padding: 8px 15px; font-weight: 800; cursor: pointer; }
        
        @media (max-width: 900px) { .paddock-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- RADAR ERROR -->
    <div id="debug-console"></div>

    <header>
        <div style="font-weight: 800; letter-spacing: 2px; font-size: 1.2rem;">PADDOCK <span style="color:var(--amg-tosca)">PORTAL</span></div>
        <div class="operator-tag" id="op-tag">ID</div>
    </header>

    <div class="paddock-container">
        <!-- DIRECTIVES PANEL -->
        <div class="panel">
            <div class="panel-header">
                Tactical Directives
                <span id="server-status">CONNECTING...</span>
            </div>
            
            <div id="admin-panel">
                <div class="admin-input">
                    <input type="text" id="dir-input" placeholder="Broadcast Directive..." autocomplete="off">
                    <button onclick="sendDir()">SEND</button>
                </div>
            </div>
            <div class="log-box" id="log-box"></div>
        </div>

        <!-- CHAT PANEL -->
        <div class="panel">
            <div class="panel-header">Encrypted Comms</div>
            <div class="chat-messages" id="chat-box"></div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Transmit..." autocomplete="off">
                <button onclick="sendChat()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Fungsi penangkap Error
        function showError(msg) {
            const debug = document.getElementById('debug-console');
            debug.style.display = 'block';
            debug.innerText = "SYSTEM FAILURE: " + msg;
            console.error("DEBUG:", msg);
        }

        // 2. Cek Sesi Login
        const activeOp = sessionStorage.getItem('activeOperator');
        if(!activeOp) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('op-tag').innerText = activeOp;
            if(activeOp === 'OPS01') document.getElementById('admin-panel').style.display = 'block';
        }

        // 3. Inisiasi Supabase
        let supabase;
        try {
            if (!window.supabase) throw new Error("Library Supabase gagal diload oleh browser!");
            
            const supabaseUrl = 'https://gzvlwrwjofdvupvisvhr.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6dmx3cndqb2ZkdnVwdmlzdmhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MTU5OTksImV4cCI6MjA5MzI5MTk5OX0.1JSIGeJOtKqY41ZnJAwITwsJ_wx7QQnBv5XmfRZzcnQ';
            
            supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
            document.getElementById('server-status').innerText = "SERVER ONLINE";
            document.getElementById('server-status').style.color = "#00A19C";

        } catch (err) {
            showError(err.message);
        }

        // 4. Render UI
        function renderChat(d) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = d.operator_id === activeOp ? 'msg self' : 'msg';
            div.innerHTML = `<div style="font-size:0.6rem; color:#666;">${d.operator_id}</div><div class="msg-body">${d.message}</div>`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function renderDir(d) {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            div.className = 'log-item important';
            div.innerHTML = `> [DIRECTIVE] ${d.message}`;
            box.insertBefore(div, box.firstChild);
        }

        // 5. Kirim Data (Dengan penangkap error mutlak)
        async function sendChat() {
            try {
                const el = document.getElementById('chat-input');
                const msg = el.value.trim();
                if(!msg) return;

                const { data, error } = await supabase.from('paddock_comms').insert([{ operator_id: activeOp, message: msg }]);
                
                if (error) throw error;
                el.value = ''; 
            } catch (err) {
                showError("Gagal kirim chat: " + err.message);
            }
        }

        async function sendDir() {
            try {
                const el = document.getElementById('dir-input');
                const msg = el.value.trim();
                if(!msg) return;

                const { data, error } = await supabase.from('paddock_directives').insert([{ message: msg }]);
                
                if (error) throw error;
                el.value = '';
            } catch (err) {
                showError("Gagal kirim pengumuman: " + err.message);
            }
        }

        // 6. Tarik Data Awal & Dengerin Realtime
        async function loadData() {
            try {
                // Load Chat
                const { data: c, error: errC } = await supabase.from('paddock_comms').select('*').order('created_at',{ascending:true}).limit(20);
                if (errC) throw errC;
                if(c) c.forEach(renderChat);

                // Load Directives
                const { data: d, error: errD } = await supabase.from('paddock_directives').select('*').order('created_at',{ascending:false}).limit(10);
                if (errD) throw errD;
                if(d) d.forEach(renderDir);

                // Subscribe Realtime
                supabase.channel('room1').on('postgres_changes',{event:'INSERT',schema:'public',table:'paddock_comms'},p=>renderChat(p.new)).subscribe();
                supabase.channel('room2').on('postgres_changes',{event:'INSERT',schema:'public',table:'paddock_directives'},p=>renderDir(p.new)).subscribe();

            } catch (err) {
                showError("Gagal menarik data dari server: " + err.message);
            }
        }

        if (supabase) loadData();

        // Enter keys
        document.getElementById('chat-input').addEventListener('keypress',e=>{if(e.key==='Enter')sendChat()});
        document.getElementById('dir-input').addEventListener('keypress',e=>{if(e.key==='Enter')sendDir()});
    </script>
</body>
</html>
