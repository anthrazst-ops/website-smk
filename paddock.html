<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PADDOCK | TELEMETRY</title>
    <!-- Mesin Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700;800&display=swap');
        
        :root {
            --amg-tosca: #00A19C; --amg-black: #000000; --amg-dark: #0D0D0D; 
            --amg-panel: #111111; --amg-silver: #A2AAAD; --pure-white: #FFFFFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--amg-black); }
        ::-webkit-scrollbar-thumb { background: #333; }

        body { background-color: var(--amg-black); color: var(--pure-white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Top Bar */
        header { background: var(--amg-panel); height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--amg-tosca); }
        .header-title { font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; display: flex; align-items: center; }
        .header-title span { color: var(--amg-tosca); margin-left: 5px; }
        .op-controls { display: flex; align-items: center; gap: 15px; }
        .utc-clock { font-family: monospace; font-size: 0.9rem; color: var(--amg-tosca); margin-right: 15px; font-weight: 600;}
        .operator-tag { font-size: 0.8rem; background: var(--pure-white); color: var(--amg-black); padding: 4px 10px; font-weight: 800; letter-spacing: 1px; border-radius: 2px; }
        .btn-logout { background: transparent; border: 1px solid #444; color: var(--amg-silver); padding: 5px 15px; cursor: pointer; transition: 0.2s; font-weight: 700; text-transform: uppercase; font-size: 0.75rem;}
        .btn-logout:hover { border-color: #ff3333; color: #ff3333; }

        /* Main Grid */
        .paddock-container { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 60px); gap: 20px; padding: 20px; }
        .panel { background: var(--amg-dark); border: 1px solid #222; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .panel-header { background: #1a1a1a; padding: 10px 15px; font-size: 0.85rem; font-weight: 800; color: var(--amg-silver); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; display: flex; justify-content: space-between;}
        .status-dot { width: 8px; height: 8px; background: var(--amg-tosca); border-radius: 50%; box-shadow: 0 0 8px var(--amg-tosca); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Left Side: Telemetry & Directives */
        .telemetry-dashboard { display: grid; grid-template-columns: 200px 1fr; gap: 15px; padding: 15px; border-bottom: 1px solid #222; }
        
        /* Radar Animation */
        .radar-box { position: relative; width: 100%; height: 180px; background: repeating-linear-gradient(transparent, transparent 20px, rgba(0, 161, 156, 0.05) 20px, rgba(0, 161, 156, 0.05) 21px), repeating-linear-gradient(90deg, transparent, transparent 20px, rgba(0, 161, 156, 0.05) 20px, rgba(0, 161, 156, 0.05) 21px), #050505; border: 1px solid #1f1f1f; overflow: hidden; border-radius: 2px; }
        .radar-box::before { content: ""; position: absolute; top: 50%; left: 50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, transparent 70%, rgba(0, 161, 156, 0.6) 100%); transform-origin: 0 0; animation: sweep 3s infinite linear; }
        @keyframes sweep { to { transform: rotate(360deg); } }

        /* Data Matrix */
        .telemetry-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .data-box { background: var(--amg-panel); border: 1px solid #1f1f1f; padding: 15px; border-left: 2px solid var(--amg-silver); }
        .data-box.active { border-left-color: var(--amg-tosca); }
        .data-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .data-value { font-size: 2rem; font-weight: 900; font-family: monospace; color: var(--pure-white); margin-top: 5px; line-height: 1; }
        .data-value span { font-size: 0.8rem; color: var(--amg-silver); }

        /* Directives Section */
        .directives-container { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Admin Input for Directives (Hidden by default) */
        #admin-panel { display: none; padding: 15px; background: #151515; border-bottom: 1px solid #222; }
        .admin-input-group { display: flex; gap: 10px; }
        .admin-input-group input { flex-grow: 1; background: transparent; border: 1px solid #333; color: var(--pure-white); padding: 8px 12px; font-family: monospace; outline: none; font-size: 0.85rem;}
        .admin-input-group input:focus { border-color: var(--amg-tosca); }
        .admin-input-group button { background: var(--pure-white); border: none; color: var(--amg-black); font-weight: 800; padding: 0 15px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s;}
        .admin-input-group button:hover { background: var(--amg-tosca); }

        .log-box { flex-grow: 1; padding: 15px; font-family: monospace; font-size: 0.85rem; color: var(--amg-silver); line-height: 1.8; overflow-y: auto; }
        .log-item { margin-bottom: 5px; border-left: 2px solid #333; padding-left: 10px; }
        .log-item.admin-log { border-left-color: var(--pure-white); color: var(--pure-white); background: rgba(255,255,255,0.05); }
        .log-time { color: var(--amg-tosca); font-size: 0.75rem; margin-right: 8px; }

        /* Chat Section */
        .chat-container { display: flex; flex-direction: column; height: 100%; }
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { font-size: 0.85rem; max-width: 85%; }
        .msg-header { font-size: 0.65rem; font-weight: 800; color: var(--amg-silver); margin-bottom: 3px; letter-spacing: 1px; }
        .msg-body { background: #1a1a1a; padding: 8px 12px; border-radius: 2px; color: var(--pure-white); border-left: 2px solid var(--amg-silver); word-wrap: break-word;}
        
        .msg.self { align-self: flex-end; }
        .msg.self .msg-header { text-align: right; color: var(--amg-tosca); }
        .msg.self .msg-body { background: #111; border-left: none; border-right: 2px solid var(--amg-tosca); }
        
        .chat-input { display: flex; padding: 15px; background: #1a1a1a; border-top: 1px solid #222; }
        .chat-input input { flex-grow: 1; background: transparent; border: none; color: var(--pure-white); font-size: 0.85rem; outline: none; font-family: monospace; }
        .chat-input button { background: var(--amg-tosca); border: none; color: var(--amg-black); padding: 8px 15px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }

        @media screen and (max-width: 900px) {
            .paddock-container { grid-template-columns: 1fr; grid-template-rows: auto 500px; padding: 10px; gap: 10px; overflow-y: auto; height: auto; min-height: calc(100vh - 60px); }
            .telemetry-dashboard { grid-template-columns: 1fr; }
            .radar-box { height: 100px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">PADDOCK <span>TELEMETRY</span></div>
        <div class="op-controls">
            <div class="utc-clock" id="utc-clock">00:00:00 UTC</div>
            <div class="operator-tag" id="op-tag">OP_UNKNOWN</div>
            <button class="btn-logout" onclick="logout()">Terminate</button>
        </div>
    </header>

    <div class="paddock-container">
        
        <!-- MAIN SYSTEM PANEL -->
        <div class="panel">
            <div class="panel-header">
                System Diagnostics
                <div class="status-dot"></div>
            </div>
            
            <div class="telemetry-dashboard">
                <div class="radar-box"></div>
                <div class="telemetry-grid">
                    <div class="data-box active">
                        <div class="data-label">Integrity</div>
                        <div class="data-value" id="val-integrity">99.9<span>%</span></div>
                    </div>
                    <div class="data-box active">
                        <div class="data-label">Ping</div>
                        <div class="data-value" id="val-ping">12<span>ms</span></div>
                    </div>
                    <div class="data-box">
                        <div class="data-label">Threats</div>
                        <div class="data-value" id="val-threat">1,042</div>
                    </div>
                    <div class="data-box">
                        <div class="data-label">Nodes</div>
                        <div class="data-value" id="val-conn">3</div>
                    </div>
                </div>
            </div>
            
            <div class="panel-header" style="border-top: 1px solid #222;">Recent Directives</div>
            
            <!-- ADMIN PANEL (HANYA MUNCUL BUAT OPS01) -->
            <div id="admin-panel">
                <div style="font-size: 0.7rem; color: var(--amg-tosca); margin-bottom: 5px; font-weight: bold; letter-spacing: 1px;">LEAD OPERATOR OVERRIDE</div>
                <div class="admin-input-group">
                    <input type="text" id="directive-input" placeholder="Enter tactical directive..." autocomplete="off">
                    <button onclick="sendDirective()">Broadcast</button>
                </div>
            </div>

            <!-- LOG OUTPUT -->
            <div class="log-box" id="directives-log">
                <div class="log-item"><span class="log-time">[SYS]</span> Secure sector initialized.</div>
            </div>
        </div>

        <!-- CHAT PANEL -->
        <div class="panel">
            <div class="panel-header">Encrypted Comms <span style="font-size: 0.65rem; color: #666;">AES-256</span></div>
            <div class="chat-container">
                <div class="chat-messages" id="chat-box">
                    <!-- Chat masuk sini -->
                </div>
                <div class="chat-input">
                    <input type="text" id="chat-input" placeholder="Transmit..." autocomplete="off">
                    <button onclick="sendMessage()" id="btn-send">Send</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 1. SESSION & UI SETUP ---
        const activeOp = sessionStorage.getItem('activeOperator');
        if (!activeOp) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('op-tag').innerText = activeOp;
            // Jika OPS01 (Lead Operator), tampilkan panel Admin
            if(activeOp === 'OPS01') {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        function logout() {
            sessionStorage.removeItem('activeOperator');
            window.location.href = 'index.html';
        }

        // Live UTC Clock
        setInterval(() => {
            const now = new Date();
            document.getElementById('utc-clock').innerText = now.toUTCString().slice(17, 25) + ' UTC';
        }, 1000);

        // Fake Telemetry numbers
        setInterval(() => {
            document.getElementById('val-ping').innerHTML = Math.floor(Math.random() * (16 - 10 + 1) + 10) + '<span>ms</span>';
            if(Math.random() > 0.8) {
                let threat = parseInt(document.getElementById('val-threat').innerText.replace(',', ''));
                document.getElementById('val-threat').innerText = (threat + 1).toLocaleString();
            }
        }, 2000);

        // --- 2. SUPABASE INTEGRATION ---
        const supabaseUrl = 'https://gzvlwrwjofdvupvisvhr.supabase.co';
        const supabaseKey = 'sb_publishable_mKKMN7ckQtsmMTiX2Ip2cA_rJALEnUB';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const chatBox = document.getElementById('chat-box');
        const logBox = document.getElementById('directives-log');

        // --- 3. DIRECTIVES (PENGUMUMAN) SYSTEM ---
        function renderDirective(data) {
            const time = new Date(data.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
            const logDiv = document.createElement('div');
            logDiv.className = 'log-item admin-log';
            logDiv.innerHTML = `<span class="log-time">[${time}]</span> <span style="color:var(--amg-tosca); font-weight:bold;">LEAD_OP:</span> ${data.message}`;
            // Taruh di paling atas
            logBox.insertBefore(logDiv, logBox.children[1] || logBox.firstChild);
        }

        async function loadDirectives() {
            const { data } = await supabase.from('paddock_directives').select('*').order('created_at', { ascending: false }).limit(10);
            if (data) data.reverse().forEach(d => renderDirective(d));
        }
        
        async function sendDirective() {
            if(activeOp !== 'OPS01') return;
            const input = document.getElementById('directive-input');
            const message = input.value.trim();
            if (message !== "") {
                input.value = '';
                await supabase.from('paddock_directives').insert([{ message: message }]);
            }
        }
        document.getElementById('directive-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendDirective(); });

        // --- 4. CHAT SYSTEM ---
        function renderMessage(msgData) {
            const isSelf = msgData.operator_id === activeOp;
            const msgDiv = document.createElement('div');
            msgDiv.className = isSelf ? 'msg self' : 'msg';
            const time = new Date(msgData.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            msgDiv.innerHTML = `<div class="msg-header">${msgData.operator_id} | ${time}</div><div class="msg-body">${msgData.message}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function loadChat() {
            const { data } = await supabase.from('paddock_comms').select('*').order('created_at', { ascending: true }).limit(50);
            if (data) {
                chatBox.innerHTML = ''; // Bersihin loading state
                data.forEach(msg => renderMessage(msg));
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            const btnSend = document.getElementById('btn-send');
            if (message !== "") {
                input.value = ''; btnSend.disabled = true;
                await supabase.from('paddock_comms').insert([{ operator_id: activeOp, message: message }]);
                btnSend.disabled = false;
            }
        }
        document.getElementById('chat-input').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

        // --- 5. INITIALIZE & REALTIME LISTENERS ---
        loadDirectives();
        loadChat();

        // Dengerin tabel Chat
        supabase.channel('paddock_comms_channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'paddock_comms' }, payload => {
                renderMessage(payload.new);
            }).subscribe();

        // Dengerin tabel Directives
        supabase.channel('paddock_directives_channel')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'paddock_directives' }, payload => {
                renderDirective(payload.new);
            }).subscribe();

    </script>
</body>
</html>
